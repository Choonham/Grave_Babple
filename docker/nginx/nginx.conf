# ============================================================
# Nginx 설정 파일
# Babple Web Frontend를 위한 리버스 프록시 및 정적 파일 서빙
# ============================================================

# 업스트림 서버 정의 (Backend API)
# 여러 Backend 인스턴스가 있을 경우 로드 밸런싱 가능
upstream backend_api {
    # Backend 서비스 이름 (Docker Compose 네트워크에서 자동으로 DNS로 해석됨)
    server backend:3000;
    
    # 여러 Backend 인스턴스 예시:
    # server backend:3000 weight=3;  # 가중치 3
    # server backend2:3000 weight=1; # 가중치 1
}

# HTTP 서버 블록
server {
    # 포트 80 (HTTP)에서 리스닝
    listen 80;
    
    # 서버 이름 (도메인)
    # 로컬 및 서버 도메인 모두 포함
    server_name localhost babpleAlpha.slowflowsoft.com babpleTest.slowFlowSoft.com;
    
    # 웹 루트 디렉토리 (빌드된 정적 파일 위치)
    root /usr/share/nginx/html;
    
    # 기본 인덱스 파일
    index index.html;
    
    # 로그 파일 설정
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Gzip 압축 활성화 (전송 크기 감소)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;  # 1KB 이상 파일만 압축
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript 
               application/x-font-ttf application/vnd.ms-fontobject 
               font/opentype image/svg+xml image/x-icon;
    
    # 클라이언트 최대 요청 본문 크기 (파일 업로드 용)
    client_max_body_size 10M;
    
    # ============================================================
    # React SPA 라우팅 설정
    # ============================================================
    location / {
        # SPA 라우팅: 파일이 없으면 index.html로 폴백
        # React Router 등 클라이언트 사이드 라우팅 지원
        try_files $uri $uri/ /index.html;
    }
    
    # ============================================================
    # API 프록시 설정
    # ============================================================
    location /api {
        # Backend API로 요청 프록시
        proxy_pass http://backend_api;
        
        # 프록시 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 지원 (Socket.io)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 타임아웃 설정 (WebSocket 장시간 연결 지원)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        
        # 버퍼링 비활성화 (실시간 통신)
        proxy_buffering off;
    }
    
    # ============================================================
    # Socket.io 프록시 설정
    # ============================================================
    location /socket.io {
        # Socket.io 엔드포인트 프록시
        proxy_pass http://backend_api;
        
        # WebSocket 헤더 설정
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 프록시 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 타임아웃 설정
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # ============================================================
    # 업로드 파일 프록시 설정
    # 백엔드를 통해 S3 파일을 가져와서 제공 (EC2 IAM 역할 사용)
    # 퍼블릭 접근 없이 보안 유지
    # 
    # 요청: /uploads/recipe/filename.jpg
    # 프록시: /api/files/uploads/recipe/filename.jpg
    # ============================================================
    location ^~ /uploads {
        # 백엔드 API로 프록시 (백엔드가 S3에서 파일을 가져와서 반환)
        # $request_uri를 그대로 전달하여 /api/files$request_uri로 변환
        proxy_pass http://backend_api/api/files$request_uri;
        
        # 프록시 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 파일 전송 최적화
        proxy_buffering off;
        proxy_request_buffering off;
        
        # 정적 파일 캐싱 (이미지는 1년)
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    
    # ============================================================
    # 약관 파일 프록시 설정
    # ============================================================
    location ^~ /docs {
        # 백엔드 API로 프록시 (백엔드가 S3에서 파일을 가져와서 반환)
        proxy_pass http://backend_api/api/files$request_uri;
        
        # 프록시 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 파일 전송 최적화
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # ============================================================
    # 정적 파일 캐싱 설정
    # ============================================================
    # JavaScript, CSS 파일 캐싱 (1년)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 이미지 파일 캐싱 (1년) - /uploads는 위의 location에서 처리됨
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 폰트 파일 캐싱 (1년)
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # HTML 파일은 캐싱하지 않음 (항상 최신 버전 서빙)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
    
    # ============================================================
    # 보안 헤더 설정
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # HTTPS로 강제 리다이렉션 (SSL 설정 후 주석 해제)
    # return 301 https://$server_name$request_uri;
}
