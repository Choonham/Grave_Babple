name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # babpleWeb 디렉토리로 이동하여 최신 코드 가져오기
          cd ~/babple/babpleWeb
          git fetch origin
          git reset --hard origin/main
          
          # Docker Compose로 웹 서비스 재빌드 및 재시작
          cd ~/babple/docker
          docker compose build web
          docker compose up -d web
          
          # 배포 완료 확인
          echo "✅ babpleWeb 배포 완료"
          docker compose ps web
